server:
  port: 8464   # single entry point

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            issuer-uri: https://accounts.google.com
  application:
    name: auth-gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"   # React dev server
            allowedMethods: "*"                      # allow all HTTP methods
            allowedHeaders: "*"                      # allow all headers
            allowCredentials: true                   # allow cookies/authorization headers if needed

      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/api/**
          filters:
            - StripPrefix=1   # strips "/user" → forwards "/api/users/register"

        - id: book-service
          uri: http://localhost:8089
          predicates:
            - Path=/book/api/**
          filters:
            - StripPrefix=1   # strips "/book" → forwards "/api/books"
jwt:
  secret: mysuperlongrandomsecretmysuperlongrandomsecret1234

